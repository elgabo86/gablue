# ASUS USB Audio (0b05:1a52) : clock 6 ne répond pas, le probing autoclock
# prend ~28s et bloque systemd-modules-load.service au boot.
# delayed_register enregistre le périphérique en asynchrone pour ne pas
# retarder le chargement du module snd-usb-audio.
options snd-usb-audio delayed_register=0b05:1a52:0
