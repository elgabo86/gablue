# Exécution directe des binaires Windows (PE/MZ) via gwine (binfmt_misc)
# Permet `./jeu.exe` en terminal et rend fonctionnel le bouton "Exécuter"
# de Dolphin/KIO pour les .exe ayant encore le bit exécutable (copies depuis
# NTFS/exFAT, archives, anciens fichiers) : le kernel invoque gwine avec le
# chemin complet du .exe en premier argument.
# Chargé au boot par systemd-binfmt.service.
:gablue-windows:M::MZ::/usr/bin/gwine:
