name: build-gablue-live-isos
permissions:
  contents: write
  id-token: write
  attestations: write
  packages: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 */5 * *"  # Tous les 5 jours à 06:00 UTC
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "**.txt"
      - ".github/**"
  # Chaînage automatique : déclenché à la fin du workflow d'images quand un push
  # contenait le tag [all-iso] (voir condition du job build-live-iso). Garantit
  # que les images :latest sont publiées AVANT de construire les ISOs.
  workflow_run:
    workflows: ["build-gablue-images"]
    types:
      - completed

env:
  REPO_OWNER: ${{ github.repository_owner }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-iso
  cancel-in-progress: true

jobs:
  build-live-iso:
    name: Build Live ISO
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[iso]')) ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.conclusion == 'success' &&
       contains(github.event.workflow_run.head_commit.message, '[all-iso]'))
    strategy:
      fail-fast: false
      matrix:
        image_name:
          - gablue-main
          - gablue-main-dx
          - gablue-nvidia
          - gablue-nvidia-open
          - gablue-nvidia-open-dx

    steps:
      - name: Afficher l'espace disque initial
        run: sudo df -h

      - name: Libérer l'espace disque (Ubuntu)
        uses: ublue-os/remove-unwanted-software@v8

      - name: Monter stockage BTRFS compressé pour podman
        # 100% de /mnt (au lieu de 80%) : les variants DX + NVIDIA sont les
        # plus grosses (image de base + flatpaks + commit payload) et dépassent
        # parfois le disque même avec 80%.
        uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6 # main
        with:
          target-dir: /var/lib/containers
          loopback-free: "1.0"

      - name: Checkout du dépôt
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Obtenir le nom en minuscules du propriétaire
        id: repo_owner_case
        run: echo "lowercase=${REPO_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Déterminer le tag de l'image
        id: generate-tag
        shell: bash
        run: |
          TAG="latest"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Build de l'image container payload
        shell: bash
        run: |
          BASE_IMAGE="ghcr.io/${{ steps.repo_owner_case.outputs.lowercase }}/${{ matrix.image_name }}:${{ steps.generate-tag.outputs.tag }}"
          INSTALL_IMAGE_PAYLOAD="ghcr.io/${{ steps.repo_owner_case.outputs.lowercase }}/${{ matrix.image_name }}:${{ steps.generate-tag.outputs.tag }}"
          for attempt in 1 2 3; do
            echo "::group::Tentative de build payload $attempt/3"
            if sudo podman build \
              --cap-add sys_admin \
              --security-opt label=disable \
              --build-arg BASE_IMAGE="$BASE_IMAGE" \
              --build-arg INSTALL_IMAGE_PAYLOAD="$INSTALL_IMAGE_PAYLOAD" \
              -t localhost/payload:latest installer/; then
              echo "::endgroup::"
              echo "Build payload réussi à la tentative $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "Échec build payload tentative $attempt — nettoyage avant retry..."
            sudo podman system prune -f --volumes || true
            sudo podman rmi localhost/payload:latest 2>/dev/null || true
            sudo df -h /
          done
          echo "::error::Échec du build payload après 3 tentatives"
          exit 1

      - name: Générer l'ISO Live avec Titanoboa
        uses: Zeglius/titanoboa@revamp-pr
        id: build
        with:
          image-ref: localhost/payload:latest
          iso-dest: ${{ matrix.image_name }}-${{ steps.generate-tag.outputs.tag }}-live-amd64.iso

      - name: Préparer le répertoire d'upload
        id: upload-directory
        shell: bash
        run: |
          ISO_UPLOAD_DIR=${{ github.workspace }}/upload
          ISO_PATH=${{ steps.build.outputs.iso-dest }}
          ISO_NAME=$(basename ${ISO_PATH})
          mkdir -p ${ISO_UPLOAD_DIR}
          mv ${ISO_PATH} ${ISO_UPLOAD_DIR}
          (cd ${ISO_UPLOAD_DIR} && sha256sum ${ISO_NAME} | tee ${ISO_NAME}-CHECKSUM)
          echo "iso-upload-dir=${ISO_UPLOAD_DIR}" >> $GITHUB_OUTPUT

      - name: Signature Cosign de l'ISO
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v2.6.1"
      - run: |
          cosign sign-blob \
            --yes \
            --bundle "${{ steps.upload-directory.outputs.iso-upload-dir }}/${{ matrix.image_name }}-${{ steps.generate-tag.outputs.tag }}-live-amd64.iso-cosign.bundle" \
            "${{ steps.upload-directory.outputs.iso-upload-dir }}/${{ matrix.image_name }}-${{ steps.generate-tag.outputs.tag }}-live-amd64.iso"
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}

      - name: Attestation de provenance du build
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.upload-directory.outputs.iso-upload-dir }}/${{ matrix.image_name }}-${{ steps.generate-tag.outputs.tag }}-live-amd64.iso

      - name: Upload de l'ISO vers BuzzHeavier
        id: upload
        shell: bash
        run: |
          ISO_PATH="${{ steps.upload-directory.outputs.iso-upload-dir }}/${{ matrix.image_name }}-${{ steps.generate-tag.outputs.tag }}-live-amd64.iso"
          ISO_NAME="${{ matrix.image_name }}"
          RESPONSE=$(curl -s -T "$ISO_PATH" "https://w.buzzheavier.com/$(basename "$ISO_PATH")")
          ID=$(echo "$RESPONSE" | jq -r '.data.id')
          LINK="https://buzzheavier.com/$ID"
          echo "$LINK" > "${ISO_NAME}-live-link.txt"

      - name: Upload artifact lien
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.image_name }}-live-link
          path: ${{ matrix.image_name }}-live-link.txt

      - name: Upload artifact checksum
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.image_name }}-live-checksum
          path: ${{ steps.upload-directory.outputs.iso-upload-dir }}/${{ matrix.image_name }}-${{ steps.generate-tag.outputs.tag }}-live-amd64.iso-CHECKSUM

  create-release:
    needs: build-live-iso
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Télécharger les artifacts liens
        uses: actions/download-artifact@v8
        with:
          pattern: "*-live-link"
          path: links

      - name: Télécharger les artifacts checksums
        uses: actions/download-artifact@v8
        with:
          pattern: "*-live-checksum"
          path: checksums

      - name: Build release body
        run: |
          {
            echo "## Gablue Live ISO"
            echo ""
            echo "Live ISOs with full Plasma desktop environment."
            echo "Try Gablue before installing!"
            echo ""
            echo "### Downloads"
            for link_file in links/*/*.txt; do
              ISO_NAME=$(basename "$(dirname "$link_file")" | sed 's/-live-link$//')
              LINK=$(cat "$link_file")
              echo "- **${ISO_NAME}**: ${LINK}"
            done
            echo ""
            echo "> **Note**: Verify the SHA256 checksum before installing."
          } > body.md

      - name: Supprimer l'ancienne release live
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest-live-iso" | jq -r '.id')
          if [ "$RELEASE_ID" != "null" ]; then
            curl -s -X DELETE -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
          fi

      - name: Créer la GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: "latest-live-iso"
          name: "Latest Live ISO Release"
          body_path: body.md
          files: checksums/*/*-CHECKSUM
          draft: false
          prerelease: false
