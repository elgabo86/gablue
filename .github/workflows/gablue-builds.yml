name: build-gablue-images
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "**.txt"
  schedule:
    - cron: "00 02 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "**.txt"
      - ".github/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-main:
    name: Build main
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (contains(github.event.head_commit.message, '[main]') || contains(github.event.head_commit.message, '[all]')))
    uses: ./.github/workflows/reusable-gablue-image.yml
    secrets: inherit
    with:
      image_name: "gablue-main"
      image_desc: "Gablue main image"
      image_variant: "main"
      source_image: "kinoite"
      fedora_version: "44"
      kernel_type: "ogc"

  build-nvidia:
    name: Build nvidia
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (contains(github.event.head_commit.message, '[nvidia]') || contains(github.event.head_commit.message, '[all]')))
    uses: ./.github/workflows/reusable-gablue-image.yml
    secrets: inherit
    with:
      image_name: "gablue-nvidia"
      image_desc: "Gablue nvidia image"
      image_variant: "nvidia"
      source_image: "kinoite"
      fedora_version: "44"
      kernel_type: "ogc"
      nvidia_flavor: "nvidia-lts"

  build-nvidia-open:
    name: Build nvidia-open
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (contains(github.event.head_commit.message, '[nvidia]') || contains(github.event.head_commit.message, '[all]')))
    uses: ./.github/workflows/reusable-gablue-image.yml
    secrets: inherit
    with:
      image_name: "gablue-nvidia-open"
      image_desc: "Gablue nvidia-open image"
      image_variant: "nvidia-open"
      source_image: "kinoite"
      fedora_version: "44"
      kernel_type: "ogc"
      nvidia_flavor: "nvidia-open"

  build-dx:
    name: Build DX
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (contains(github.event.head_commit.message, '[dx]') || contains(github.event.head_commit.message, '[all]')))
    uses: ./.github/workflows/reusable-gablue-image.yml
    secrets: inherit
    with:
      image_name: "gablue-main-dx"
      image_desc: "Gablue main-dx image (développement avec virtualisation)"
      image_variant: "main"
      source_image: "kinoite"
      fedora_version: "44"
      kernel_type: "ogc"

  build-test:
    name: Build test
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (contains(github.event.head_commit.message, '[test]') || contains(github.event.head_commit.message, '[all]')))
    uses: ./.github/workflows/reusable-gablue-image.yml
    secrets: inherit
    with:
      image_name: "gablue-main-test"
      image_desc: "Gablue main test image (kernel ogc unstable)"
      image_variant: "main"
      source_image: "kinoite"
      fedora_version: "44"
      kernel_type: "ogc"

  build-nvidia-open-test:
    name: Build nvidia-open-test
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (contains(github.event.head_commit.message, '[test]') || contains(github.event.head_commit.message, '[nvidia]') || contains(github.event.head_commit.message, '[all]')))
    uses: ./.github/workflows/reusable-gablue-image.yml
    secrets: inherit
    with:
      image_name: "gablue-nvidia-open-test"
      image_desc: "Gablue nvidia-open test image (kernel ogc unstable)"
      image_variant: "nvidia-open"
      source_image: "kinoite"
      fedora_version: "44"
      kernel_type: "ogc"
      nvidia_flavor: "nvidia-open"
      containerfile: "Containerfile-gablue-nvidia-open-test"
