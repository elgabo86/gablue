name: build-gablue-images
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "**.txt"
  schedule:
    - cron: "00 02 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "**.txt"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-main:
    name: Build main
    concurrency:
      group: build-gablue-images-main-${{ github.ref }}
      cancel-in-progress: true
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (contains(github.event.head_commit.message, '[main]') || contains(github.event.head_commit.message, '[all]') || contains(github.event.head_commit.message, '[all-iso]')))
    uses: ./.github/workflows/reusable-gablue-image.yml
    secrets: inherit
    with:
      image_name: "gablue-main"
      image_desc: "Gablue main image"
      image_variant: "main"
      source_image: "kinoite"
      fedora_version: "44"
      kernel_type: "ogc"

  build-nvidia:
    name: Build nvidia
    concurrency:
      group: build-gablue-images-nvidia-${{ github.ref }}
      cancel-in-progress: true
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (contains(github.event.head_commit.message, '[nvidia]') || contains(github.event.head_commit.message, '[all]') || contains(github.event.head_commit.message, '[all-iso]')))
    uses: ./.github/workflows/reusable-gablue-image.yml
    secrets: inherit
    with:
      image_name: "gablue-nvidia"
      image_desc: "Gablue nvidia image"
      image_variant: "nvidia"
      source_image: "kinoite"
      fedora_version: "44"
      kernel_type: "ogc"
      nvidia_flavor: "nvidia-lts"

  build-nvidia-open:
    name: Build nvidia-open
    concurrency:
      group: build-gablue-images-nvidia-open-${{ github.ref }}
      cancel-in-progress: true
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (contains(github.event.head_commit.message, '[nvidia]') || contains(github.event.head_commit.message, '[all]') || contains(github.event.head_commit.message, '[all-iso]')))
    uses: ./.github/workflows/reusable-gablue-image.yml
    secrets: inherit
    with:
      image_name: "gablue-nvidia-open"
      image_desc: "Gablue nvidia-open image"
      image_variant: "nvidia-open"
      source_image: "kinoite"
      fedora_version: "44"
      kernel_type: "ogc"
      nvidia_flavor: "nvidia-open"

  build-dx:
    name: Build DX
    concurrency:
      group: build-gablue-images-dx-${{ github.ref }}
      cancel-in-progress: true
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (contains(github.event.head_commit.message, '[dx]') || contains(github.event.head_commit.message, '[all]') || contains(github.event.head_commit.message, '[all-iso]')))
    uses: ./.github/workflows/reusable-gablue-image.yml
    secrets: inherit
    with:
      image_name: "gablue-main-dx"
      image_desc: "Gablue main-dx image (développement avec virtualisation)"
      image_variant: "main"
      source_image: "kinoite"
      fedora_version: "44"
      kernel_type: "ogc"

  build-nvidia-open-dx:
    name: Build nvidia-open DX
    concurrency:
      group: build-gablue-images-nvidia-open-dx-${{ github.ref }}
      cancel-in-progress: true
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (contains(github.event.head_commit.message, '[dx]') || contains(github.event.head_commit.message, '[nvidia]') || contains(github.event.head_commit.message, '[all]') || contains(github.event.head_commit.message, '[all-iso]')))
    uses: ./.github/workflows/reusable-gablue-image.yml
    secrets: inherit
    with:
      image_name: "gablue-nvidia-open-dx"
      image_desc: "Gablue nvidia-open-dx image (développement avec virtualisation)"
      image_variant: "nvidia-open"
      source_image: "kinoite"
      fedora_version: "44"
      kernel_type: "ogc"
      nvidia_flavor: "nvidia-open"

  build-test:
    name: Build test
    # Désactivé temporairement
    if: false
    uses: ./.github/workflows/reusable-gablue-image.yml
    secrets: inherit
    with:
      image_name: "gablue-main-test"
      image_desc: "Gablue main test image (kernel ogc unstable)"
      image_variant: "main"
      source_image: "kinoite"
      fedora_version: "44"
      kernel_type: "ogc"

  update-readme:
    name: Update README versions
    runs-on: ubuntu-24.04
    needs: [build-main, build-nvidia, build-nvidia-open, build-dx, build-nvidia-open-dx]
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download version artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: versions-*
          merge-multiple: true
          path: versions-data

      - name: Update README with versions
        id: update_readme
        run: |
          # Lire les versions depuis les artifacts (fichiers nommés par image)
          main_json=$(cat versions-data/gablue-main.json)
          
          # Extraire les versions communes
          fedora=$(echo "$main_json" | jq -r '.fedora')
          kernel=$(echo "$main_json" | jq -r '.kernel')
          mesa=$(echo "$main_json" | jq -r '.mesa')
          plasma=$(echo "$main_json" | jq -r '.plasma')
          export fedora kernel mesa plasma build_date nvidia_closed nvidia_open
          
          # Extraire les versions NVIDIA spécifiques
          nvidia_closed="N/A"
          nvidia_open="N/A"
          if [ -f versions-data/gablue-nvidia.json ]; then
            nvidia_closed=$(jq -r '.nvidia' versions-data/gablue-nvidia.json)
          fi
          if [ -f versions-data/gablue-nvidia-open.json ]; then
            nvidia_open=$(jq -r '.nvidia' versions-data/gablue-nvidia-open.json)
          fi
          
          # Date du build (UTC)
          build_date=$(date -u +'%Y-%m-%d')
          
          # Construire la section markdown avec balises
           /usr/bin/python3 -c "
          import re, os

          fedora = os.environ['fedora']
          kernel = os.environ['kernel']
          mesa = os.environ['mesa']
          plasma = os.environ['plasma']
          nvidia_closed = os.environ['nvidia_closed']
          nvidia_open = os.environ['nvidia_open']
          build_date = os.environ['build_date']

          table = (
              '| Component | Version |\n'
              '|---' + '|---' + '|\n'
              f'| Last build | {build_date} |\n'
              f'| Fedora | {fedora} |\n'
              f'| Kernel (OGC) | {kernel} |\n'
              f'| Mesa (Terra) | {mesa} |\n'
              f'| KDE Plasma | {plasma} |\n'
              f'| NVIDIA (open) | {nvidia_open} |\n'
              f'| NVIDIA (closed) | {nvidia_closed} |'
          )
          
          new_section = f'<!-- VERSIONS_START -->\n\n{table}\n\n<!-- VERSIONS_END -->'
          
          with open('README.md', 'r') as f:
              content = f.read()
          
          if '<!-- VERSIONS_START -->' not in content:
              # Ajouter la section avant la section Installation
              content = content.replace('## Installation', new_section + '\n\n## Installation')
          else:
              # Remplacer la section existante
              content = re.sub(
                  r'<!-- VERSIONS_START -->.*?<!-- VERSIONS_END -->',
                  new_section,
                  content,
                  flags=re.DOTALL
              )
          
          with open('README.md', 'w') as f:
              f.write(content)
          
          print('README mis à jour avec les versions.')
          print(f'  Fedora: {fedora}')
          print(f'  Kernel: {kernel}')
          print(f'  Mesa: {mesa}')
          print(f'  Plasma: {plasma}')
          print(f'  NVIDIA closed: {nvidia_closed}')
          print(f'  NVIDIA open: {nvidia_open}')
          "
          
          # Vérifier si des changements ont eu lieu
          if git diff --quiet README.md; then
            echo "Aucun changement de version détecté."
            echo "skip_commit=true" >> $GITHUB_OUTPUT
          else
            echo "Changements de version détectés :"
            git diff README.md
            echo "skip_commit=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated README
        if: steps.update_readme.outputs.skip_commit != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "[skip ci] docs: update versions table in README"
          # Réessayer le push en cas de commit concurrent sur main (rebase puis push)
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push réussi."
              break
            fi
            echo "Push rejeté (tentative $i), rebase sur origin/main..."
            git pull --rebase --autostash origin main
            sleep 5
          done

  build-nvidia-open-test:
    name: Build nvidia-open-test
    # Désactivé temporairement
    if: false
    uses: ./.github/workflows/reusable-gablue-image.yml
    secrets: inherit
    with:
      image_name: "gablue-nvidia-open-test"
      image_desc: "Gablue nvidia-open test image (kernel ogc unstable)"
      image_variant: "nvidia-open"
      source_image: "kinoite"
      fedora_version: "44"
      kernel_type: "ogc"
      nvidia_flavor: "nvidia-open"
      containerfile: "Containerfile-gablue-nvidia-open-test"
