name: Reusable Build Image
on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      image_desc:
        required: true
        type: string
      image_variant:
        required: true
        type: string
      source_image:
        required: true
        type: string
      source_suffix:
        required: false
        type: string
        default: ""
      fedora_version:
        required: true
        type: string
      kernel_type:
        required: true
        type: string
      kernel_version:
        required: false
        type: string
        # Version du kernel choisie manuellement (ublue-os/bazzite@982d035)
        default: "7.1.3-ogc3.4.fc44.x86_64"
      nvidia_flavor:
        required: false
        type: string
        default: ""
      containerfile:
        required: false
        type: string
        default: ""

env:
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"

jobs:
  build:
    name: ${{ inputs.image_name }}-${{ inputs.fedora_version }}
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # Étape pour récupérer la version du kernel via skopeo list-tags
      - name: Get latest kernel version
        id: get_kernel_version
        if: inputs.kernel_version == ''
        run: |
          KERNEL_FLAVOR="${{ inputs.kernel_type }}"
          FEDORA_VERSION="${{ inputs.fedora_version }}"
          
          # Récupérer la liste des tags disponibles pour ublue-os/akmods
          echo "Fetching available ${KERNEL_FLAVOR} kernel tags..."
          TAGS_JSON=$(skopeo list-tags "docker://ghcr.io/ublue-os/akmods" 2>/dev/null || echo '{"Tags":[]}')
          
          # Filtrer les tags pour trouver le kernel correspondant à la version Fedora
          # Pattern: {KERNEL_FLAVOR}-{FEDORA_VERSION}-{KERNEL_VERSION}
          KERNEL_VERSION=$(echo "$TAGS_JSON" | jq -r --arg kf "$KERNEL_FLAVOR" --arg fv "$FEDORA_VERSION" '
            .Tags[] 
            | select(startswith($kf + "-" + $fv + "-")) 
            | sub($kf + "-" + $fv + "-"; "")
          ' | sort -V | tail -1)
          
          if [[ -z "$KERNEL_VERSION" ]] || [[ "$KERNEL_VERSION" == "null" ]]; then
            echo "Erreur : Impossible de trouver un kernel ${KERNEL_FLAVOR} pour Fedora $FEDORA_VERSION"
            echo "Tags disponibles:"
            echo "$TAGS_JSON" | jq -r '.Tags[]'
            exit 1
          fi
          
          echo "Using latest ${KERNEL_FLAVOR} kernel: $KERNEL_VERSION"

          echo "KERNEL_VERSION=$KERNEL_VERSION" >> $GITHUB_OUTPUT
          echo "KERNEL_FLAVOR=$KERNEL_FLAVOR" >> $GITHUB_OUTPUT

      # Étape pour définir la version du noyau
      - name: Determine kernel version
        id: determine_kernel_version
        run: |
          if [[ -n "${{ inputs.kernel_version }}" ]]; then
            KERNEL_VERSION="${{ inputs.kernel_version }}"
          elif [[ -n "${{ steps.get_kernel_version.outputs.KERNEL_VERSION }}" ]]; then
            KERNEL_VERSION="${{ steps.get_kernel_version.outputs.KERNEL_VERSION }}"
          else
            echo "Erreur : Aucune version du noyau spécifiée ou trouvée pour Fedora ${{ inputs.fedora_version }}"
            exit 1
          fi
          echo "KERNEL_VERSION=$KERNEL_VERSION" >> $GITHUB_OUTPUT

      # Générer un timestamp unique pour tout le workflow
      - name: Generate timestamp
        id: timestamp
        run: |
          BUILD_VERSION="$(date +'%Y%m%d-%Hh%M')"
          echo "build_version=$BUILD_VERSION" >> $GITHUB_OUTPUT
          echo "Generated build version: $BUILD_VERSION"

      # Checkout du dépôt
      - name: Checkout repository
        uses: actions/checkout@v7

      # Timestamp de début pour calculer la durée
      - name: Début du chrono
        run: echo "BUILD_START=$(date +%s)" >> "$GITHUB_ENV"

      # Optimisation de l'espace
      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@v8

      # Mount BTRFS for podman storage (performance + compression)
      - name: Mount BTRFS for podman storage
        uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6 # main
        with:
          target-dir: /var/lib/containers
          # 100% de l'espace /mnt (au lieu de 80%) : +13 Go pour absorber le
          # pic d'espace du rechunk (raw-img + chunked-img cohabitent), qui
          # faisait échouer par intermittence la variante DX (la plus grosse)
          loopback-free: "1.0"

      # Construction de l'image (retry uniquement sur erreurs réseau transitoires)
      # timeout_minutes est géré par nick-fields/retry en interne (seul mécanisme
      # de timeout fiable dans les workflows réutilisables)
      - name: Build Image
        id: build_image
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 60
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            # Nettoyage d'un éventuel build partiel
            sudo buildah rmi raw-img 2>/dev/null || true

            # Choisir le bon Containerfile
            if [[ -n "${{ inputs.containerfile }}" ]]; then
              CONTAINERFILE="${{ inputs.containerfile }}"
            elif [[ "${{ inputs.image_name }}" == "gablue-main-test" ]]; then
              CONTAINERFILE="Containerfile-gablue-test"
            elif [[ "${{ inputs.image_name }}" == "gablue-nvidia-open-test" ]]; then
              CONTAINERFILE="Containerfile-gablue-nvidia-open-test"
            else
              CONTAINERFILE="Containerfile-gablue"
            fi

            DX_MODE_ARG=""
            if [[ "${{ inputs.image_name }}" == "gablue-main-dx" || "${{ inputs.image_name }}" == "gablue-nvidia-open-dx" ]]; then
              DX_MODE_ARG="--build-arg DX_MODE=true"
            fi

            NVIDIA_FLAVOR_ARG=""
            if [[ -n "${{ inputs.nvidia_flavor }}" ]]; then
              NVIDIA_FLAVOR_ARG="--build-arg NVIDIA_FLAVOR=${{ inputs.nvidia_flavor }}"
            fi

            SOURCE_SUFFIX_ARG=""
            if [[ -n "${{ inputs.source_suffix }}" ]]; then
              SOURCE_SUFFIX_ARG="--build-arg SOURCE_SUFFIX=${{ inputs.source_suffix }}"
            fi

            # Lancement du build avec capture de la sortie
            BUILD_LOG=$(mktemp)
            set +e
            sudo buildah build \
              --file "$CONTAINERFILE" \
              --format "docker" \
              --build-arg KERNEL_VERSION="${{ steps.determine_kernel_version.outputs.KERNEL_VERSION }}" \
              --build-arg VARIANT="${{ inputs.image_variant }}" \
              --build-arg SOURCE_IMAGE="${{ inputs.source_image }}" \
              --build-arg FEDORA_VERSION="${{ inputs.fedora_version }}" \
              --build-arg KERNEL_FLAVOR="${{ inputs.kernel_type }}" \
              $NVIDIA_FLAVOR_ARG \
              $SOURCE_SUFFIX_ARG \
              $DX_MODE_ARG \
              --tag raw-img . 2>&1 | tee "$BUILD_LOG"
            EXIT_CODE=$?
            set -e

            if [ "$EXIT_CODE" -eq 0 ]; then
              rm -f "$BUILD_LOG"
              exit 0
            fi

            # Détection erreur réseau vs build
            if grep -qiE '(TLS handshake timeout|i/o timeout|connection refused|connection reset|no route to host|could not resolve|Temporary failure in name resolution|request canceled while waiting for connection|dial tcp|net/http: request canceled|unexpected EOF|read: connection reset by peer|curl error.*Timeout)' "$BUILD_LOG"; then
              echo "::warning::Erreur réseau détectée, retry dans 20s..."
              rm -f "$BUILD_LOG"
              exit 1
            fi

            echo "::error::Erreur de build (non réseau), abandon."
            rm -f "$BUILD_LOG"
            exit 2

      # Appliquer les labels OCI avant le rechunk
      - name: Apply Labels
        id: relabel
        env:
          IMAGE_LABELS: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository }}/main/README.md
            org.opencontainers.image.description=${{ inputs.image_desc }}
            org.opencontainers.image.title=${{ inputs.image_name }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.vendor=Universal Blue
        run: |
          version="${{ steps.timestamp.outputs.build_version }}"

          # Clean out labels from base image
          img=raw-img
          container=$(sudo buildah from $img)
          sudo buildah config --label "-" $container
          sudo buildah commit --identity-label=false --rm $container $img

          kver=$(sudo podman run --rm "$img" rpm -q --qf "%{VERSION}-%{RELEASE}.%{ARCH}\n" kernel-core)

          # Préparer les labels
          declare -a labels
          labels+=("org.opencontainers.image.version=$version")
          labels+=("org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')")
          labels+=("ostree.bootable=true")
          labels+=("ostree.linux=$kver")
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            labels+=("$line")
          done <<< "$IMAGE_LABELS"

          # Générer le manifest
          filter='{ "packages": [inputs | split(" ") | select(length==2) | { (.[0]): .[1] }] | sort_by(keys) | add }'
          manifest=$(sudo podman run --rm "$img" rpm -qa --qf '%{NAME} %{VERSION}\n' | jq -Rnc "$filter")
          labels+=("ostree.rechunk.info=$manifest")

          # Appliquer les labels et annotations (comme Bazzite)
          container=$(sudo buildah from $img)
          for line in "${labels[@]}"; do
            [ -z "$line" ] && continue
            sudo buildah config --label "$line" --annotation "$line" "$container"
          done

          sudo buildah commit --identity-label=false --rm $container $img
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Extraction des versions pour mise à jour du README
      - name: Extract package versions
        id: extract_versions
        run: |
          img="raw-img"
          
          # Extraire les versions des paquets principaux
          kernel_ver=$(sudo podman run --rm "$img" rpm -q --qf "%{VERSION}-%{RELEASE}" kernel-core 2>/dev/null || echo "N/A")
          mesa_ver=$(sudo podman run --rm "$img" rpm -q --qf "%{VERSION}" mesa-dri-drivers 2>/dev/null || echo "N/A")
          plasma_ver=$(sudo podman run --rm "$img" rpm -q --qf "%{VERSION}" plasma-desktop 2>/dev/null || echo "N/A")
          nvidia_ver="N/A"
          if sudo podman run --rm "$img" rpm -q nvidia-driver &>/dev/null; then
            nvidia_ver=$(sudo podman run --rm "$img" rpm -q --qf "%{VERSION}" nvidia-driver 2>/dev/null || echo "N/A")
          fi
          fedora_ver="${{ inputs.fedora_version }}"
          
          # Générer le JSON des versions (nom de fichier unique par image)
          VER_FILE="${{ inputs.image_name }}.json"
          jq -n \
            --arg image "${{ inputs.image_name }}" \
            --arg fedora "$fedora_ver" \
            --arg kernel "$kernel_ver" \
            --arg mesa "$mesa_ver" \
            --arg plasma "$plasma_ver" \
            --arg nvidia "$nvidia_ver" \
            '{
              image: $image,
              fedora: $fedora,
              kernel: $kernel,
              mesa: $mesa,
              plasma: $plasma,
              nvidia: $nvidia
            }' > "$VER_FILE"
          
          echo "Versions extraites pour ${{ inputs.image_name }} :"
          cat "$VER_FILE"
          
      - name: Upload versions artifact
        uses: actions/upload-artifact@v7
        with:
          name: versions-${{ inputs.image_name }}
          path: ${{ inputs.image_name }}.json
          retention-days: 7

      # Métriques de build (espace disque, taille image, etc.)
      - name: Collect build metrics
        id: metrics
        run: |
          IMG_NAME="${{ inputs.image_name }}"
          BUILD_TIME=$(( $(date +%s) - BUILD_START ))
          TIMESTAMP="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          # Espace disque
          ROOT_FREE=$(df -h / | awk 'NR==2{print $4}')
          ROOT_USED=$(df -h / | awk 'NR==2{print $3}')
          ROOT_SIZE=$(df -h / | awk 'NR==2{print $2}')
          ROOT_PCT=$(df -h / | awk 'NR==2{print $5}')
          MNT_FREE=$(df -h /mnt 2>/dev/null | awk 'NR==2{print $4}' || echo "N/A")
          PODMAN_FREE=$(df -h /var/lib/containers 2>/dev/null | awk 'NR==2{print $4}' || echo "N/A")

          # Taille de l'image
          IMG_SIZE=$(sudo podman images raw-img --format '{{.Size}}' 2>/dev/null || echo "N/A")

          # Nombre de paquets RPM
          PKG_COUNT=$(sudo podman run --rm raw-img rpm -qa 2>/dev/null | wc -l || echo "N/A")

          # Versions
          KERNEL_VER=$(sudo podman run --rm raw-img rpm -q --qf '%{VERSION}-%{RELEASE}' kernel-core 2>/dev/null || echo "N/A")
          MESA_VER=$(sudo podman run --rm raw-img rpm -q --qf '%{VERSION}' mesa-dri-drivers 2>/dev/null || echo "N/A")

          # JSON
          METRICS_FILE="${IMG_NAME}-metrics.json"
          jq -n \
            --arg image "$IMG_NAME" \
            --arg timestamp "$TIMESTAMP" \
            --arg build_time "$BUILD_TIME" \
            --arg root_free "$ROOT_FREE" \
            --arg root_used "$ROOT_USED" \
            --arg root_size "$ROOT_SIZE" \
            --arg root_pct "$ROOT_PCT" \
            --arg mnt_free "$MNT_FREE" \
            --arg podman_free "$PODMAN_FREE" \
            --arg img_size "$IMG_SIZE" \
            --arg pkg_count "$PKG_COUNT" \
            --arg kernel "$KERNEL_VER" \
            --arg mesa "$MESA_VER" \
            '{
              image: $image,
              timestamp: $timestamp,
              build_time_s: $build_time,
              disk: {
                root: { size: $root_size, used: $root_used, free: $root_free, pct: $root_pct },
                mnt: { free: $mnt_free },
                podman_storage: { free: $podman_free }
              },
              image_size: $img_size,
              package_count: $pkg_count,
              kernel: $kernel,
              mesa: $mesa
            }' > "$METRICS_FILE"

          # Step summary
          {
            echo "## 📊 Build metrics — ${IMG_NAME}"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Timestamp | ${TIMESTAMP} |"
            echo "| Build time | ${BUILD_TIME}s |"
            echo "| Image size | ${IMG_SIZE} |"
            echo "| RPM packages | ${PKG_COUNT} |"
            echo "| Kernel | ${KERNEL_VER} |"
            echo "| Mesa | ${MESA_VER} |"
            echo ""
            echo "### Disk space"
            echo ""
            echo "| Mount point | Size | Used | Free | % |"
            echo "|-------------|------|------|------|---|"
            echo "| / | ${ROOT_SIZE} | ${ROOT_USED} | ${ROOT_FREE} | ${ROOT_PCT} |"
            echo "| /mnt | - | - | ${MNT_FREE} | - |"
            echo "| /var/lib/containers | - | - | ${PODMAN_FREE} | - |"
          } >> "$GITHUB_STEP_SUMMARY"

          cat "$METRICS_FILE"

      # Rechunk de l'image avec rpm-ostree (après application des labels)
      - name: Rechunk Image
        id: rechunk
        run: |
          container=$(sudo buildah from raw-img)
          mnt=$(sudo buildah mount $container)
          sudo bash -c "rm -rf $mnt/run/.[!.]* $mnt/run/* $mnt/tmp/.[!.]* $mnt/tmp/*"
          sudo buildah umount $container
          sudo buildah commit --identity-label=false --rm $container raw-img
          # Utiliser l'image elle-même pour le rechunk (comme Bazzite)
          sudo podman run --rm --privileged --volume /var/lib/containers:/var/lib/containers \
              raw-img \
              rpm-ostree compose build-chunked-oci \
              --bootc --max-layers 127 --format-version 2 \
              --from localhost/raw-img --output containers-storage:localhost/chunked-img
          sudo podman untag raw-img
          echo "ref=containers-storage:localhost/chunked-img" >> "$GITHUB_OUTPUT"

      # Upload des métriques (taille compressée ajoutée après le push vers GHCR)
      - name: Upload metrics
        uses: actions/upload-artifact@v7
        with:
          name: metrics-${{ inputs.image_name }}
          path: ${{ inputs.image_name }}-metrics.json
          retention-days: 90

      # Génération des tags après relabel
      - name: Generate tags
        id: generate-tags
        shell: bash
        run: |
          VERSION_TAG="${{ steps.relabel.outputs.version }}"
          SHA_SHORT="${GITHUB_SHA::7}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              alias_tags=("pr-${{ github.event.number }}" "${SHA_SHORT}")
          else
              alias_tags=("${VERSION_TAG}" "latest")
          fi

          echo "Generated alias tags: ${alias_tags[*]}"
          echo "alias_tags=${alias_tags[*]}" >> $GITHUB_OUTPUT

      # Conversion registre en minuscules
      - name: Lowercase Registry
        id: registry_case
        uses: ASzc/change-string-case-action@v8
        with:
          string: ${{ env.IMAGE_REGISTRY }}

      # Installation Cosign
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v2.6.1"
        if: github.event_name != 'pull_request'

      # Push et signature de l'image avec retry
      - name: Push To GHCR and Sign
        if: github.event_name != 'pull_request'
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 120
          max_attempts: 3
          retry_wait_seconds: 15
          retry_on: error
          command: |
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Push unique image id and sign
            dest_image="${{ steps.registry_case.outputs.lowercase }}/${{ inputs.image_name }}:${{ steps.relabel.outputs.version }}"
            sudo skopeo copy ${{ steps.rechunk.outputs.ref }} docker://$dest_image
            DIGEST=$(sudo skopeo inspect --format '{{.Digest}}' ${{ steps.rechunk.outputs.ref }})
            cosign sign -y --key env://COSIGN_PRIVATE_KEY --new-bundle-format=false \
              "${{ steps.registry_case.outputs.lowercase }}/${{ inputs.image_name }}@$DIGEST"

            # Push alias tags
            for tag in ${{ steps.generate-tags.outputs.alias_tags }}; do
              dest_image="${{ steps.registry_case.outputs.lowercase }}/${{ inputs.image_name }}:$tag"
              sudo skopeo copy ${{ steps.rechunk.outputs.ref }} docker://$dest_image
            done
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
