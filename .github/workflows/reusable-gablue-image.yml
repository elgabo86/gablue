name: Reusable Build Image
on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      image_desc:
        required: true
        type: string
      image_variant:
        required: true
        type: string
      source_image:
        required: true
        type: string
      source_suffix:
        required: true
        type: string
      fedora_version:
        required: true
        type: string
      kernel_type:
        required: true
        type: string
      kernel_version:
        required: false
        type: string
        default: ""
      kernel_flavor:
        required: false
        type: string
        default: ""
      containerfile:
        required: false
        type: string
        default: ""

env:
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"

jobs:
  build:
    name: ${{ inputs.image_name }}-${{ inputs.fedora_version }}
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # Étape pour récupérer la version du kernel via skopeo inspect
      - name: Get latest kernel version
        id: get_kernel_version
        if: inputs.kernel_version == ''
        run: |
          # Pour les images test, utiliser le kernel ogc depuis ublue-os/akmods
          if [[ "${{ inputs.image_name }}" == "gablue-main-test" ]] || [[ "${{ inputs.image_name }}" == "gablue-nvidia-open-test" ]]; then
            KERNEL_FLAVOR="ogc"
            FEDORA_VERSION="${{ inputs.fedora_version }}"
            
            # Récupérer la liste des tags disponibles pour ublue-os/akmods
            echo "Fetching available ogc kernel tags..."
            TAGS_JSON=$(skopeo list-tags "docker://ghcr.io/ublue-os/akmods" 2>/dev/null || echo '{"Tags":[]}')
            
            # Filtrer les tags pour trouver le kernel ogc correspondant à la version Fedora
            # Pattern: ogc-{FEDORA_VERSION}-{KERNEL_VERSION}
            KERNEL_VERSION=$(echo "$TAGS_JSON" | jq -r --arg fv "$FEDORA_VERSION" '
              .Tags[] 
              | select(startswith("ogc-" + $fv + "-")) 
              | sub("^ogc-" + $fv + "-"; "")
            ' | sort -V | tail -1)
            
            if [[ -z "$KERNEL_VERSION" ]] || [[ "$KERNEL_VERSION" == "null" ]]; then
              echo "Erreur : Impossible de trouver un kernel ogc pour Fedora $FEDORA_VERSION"
              echo "Tags disponibles:"
              echo "$TAGS_JSON" | jq -r '.Tags[]'
              exit 1
            fi
            
            echo "Using latest ogc kernel for test image: $KERNEL_VERSION"
          else
            # Construire l'URI du conteneur kernel bazzite standard
            KERNEL_URI="ghcr.io/bazzite-org/kernel-bazzite:latest-f${{ inputs.fedora_version }}-x86_64"

            echo "Kernel URI: $KERNEL_URI"

            # Utiliser skopeo inspect pour récupérer les labels
            KERNEL_INFO=$(skopeo inspect "docker://$KERNEL_URI")
            if [[ -z "$KERNEL_INFO" ]]; then
              echo "Erreur : Impossible de récupérer les informations du kernel depuis $KERNEL_URI"
              exit 1
            fi

            # Extraire la version du kernel depuis les labels (ou utiliser "latest" comme fallback)
            KERNEL_VERSION=$(echo "$KERNEL_INFO" | jq -r '.Labels["org.bazzite.kernel.version"] // "latest"')
            KERNEL_FLAVOR="bazzite"

            echo "LATEST_TAG=$KERNEL_URI" >> $GITHUB_OUTPUT
            
            # Extraire la version NVIDIA depuis les labels pour compatibilité exacte
            if [[ "${{ inputs.image_variant }}" == "nvidia-open" ]]; then
              NVIDIA_VERSION=$(echo "$KERNEL_INFO" | jq -r '.Labels["org.bazzite.kernel.nvidia"] // "latest"')
            else
              NVIDIA_VERSION=$(echo "$KERNEL_INFO" | jq -r '.Labels["org.bazzite.kernel.nvidia_lts"] // "latest"')
            fi

            # Fallback: si le label n'existe pas, on utilise "latest"
            if [[ "$NVIDIA_VERSION" == "null" ]] || [[ -z "$NVIDIA_VERSION" ]]; then
              NVIDIA_VERSION="latest"
            fi
            
            echo "NVIDIA_VERSION=$NVIDIA_VERSION" >> $GITHUB_OUTPUT
          fi

          # Fallback: si le label n'existe pas, on utilise "latest"
          if [[ "$KERNEL_VERSION" == "null" ]] || [[ -z "$KERNEL_VERSION" ]]; then
            KERNEL_VERSION="latest"
          fi

          echo "KERNEL_VERSION=$KERNEL_VERSION" >> $GITHUB_OUTPUT
          echo "KERNEL_FLAVOR=$KERNEL_FLAVOR" >> $GITHUB_OUTPUT
          echo "NVIDIA_VERSION=${NVIDIA_VERSION:-latest}" >> $GITHUB_OUTPUT

      # Étape pour définir la version du noyau
      - name: Determine kernel version
        id: determine_kernel_version
        shell: bash
        run: |
          if [[ -n "${{ inputs.kernel_version }}" ]]; then
            KERNEL_VERSION="${{ inputs.kernel_version }}"
          elif [[ -n "${{ steps.get_kernel_version.outputs.KERNEL_VERSION }}" ]]; then
            KERNEL_VERSION="${{ steps.get_kernel_version.outputs.KERNEL_VERSION }}"
          else
            echo "Erreur : Aucune version du noyau spécifiée ou trouvée pour Fedora ${{ inputs.fedora_version }}"
            exit 1
          fi
          echo "KERNEL_VERSION=$KERNEL_VERSION" >> $GITHUB_OUTPUT

      # Générer un timestamp unique pour tout le workflow
      - name: Generate timestamp
        id: timestamp
        run: |
          BUILD_VERSION="$(date +'%Y%m%d-%Hh%M')"
          echo "build_version=$BUILD_VERSION" >> $GITHUB_OUTPUT
          echo "Generated build version: $BUILD_VERSION"

      # Checkout du dépôt
      - name: Checkout repository
        uses: actions/checkout@v6

      # Optimisation de l'espace
      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@v8

      # Mount BTRFS for podman storage (performance + compression)
      - name: Mount BTRFS for podman storage
        uses: ublue-os/container-storage-action@main
        with:
          target-dir: /var/lib/containers

      # Préparation du cache DNF pour accélérer les builds
      - name: DNF Package Cache Prep
        id: cache-prep
        env:
          IMAGE: ${{ inputs.image_name }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -eoux pipefail
          
          # Nom du cache basé sur l'image source (kinoite/silverblue)
          if [[ "${{ inputs.source_image }}" =~ "kinoite" ]]; then
            CACHE_NAME="kde"
          else
            CACHE_NAME="gnome"
          fi

          # Permettre l'écriture dans le cache uniquement pour les builds sur main
          # (pas pour les PRs car le cache serait écrasé)
          ALLOW_CACHE_WRITE="false"
          if [[ "${{ github.event_name }}" != "pull_request" ]] && [[ "${{ github.ref_name }}" == "main" ]]; then
            ALLOW_CACHE_WRITE="true"
          fi

          echo "cache_name=${CACHE_NAME}" >> "$GITHUB_OUTPUT"
          echo "allow_cache_write=${ALLOW_CACHE_WRITE}" >> "$GITHUB_OUTPUT"

      # Restoration du cache DNF
      - name: Restore DNF package cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: /var/tmp/buildah-cache-*
          key: ${{ runner.os }}-buildah-${{ steps.cache-prep.outputs.cache_name }}

      # Métadonnées de l'image
      - name: Image Metadata
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ inputs.image_name }}
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository }}/main/README.md
            org.opencontainers.image.description=${{ inputs.image_desc }}
            org.opencontainers.image.title=${{ inputs.image_name }}

      # Construction de l'image
      - name: Build Image
        id: build_image
        shell: bash
        run: |
          # Choisir le bon Containerfile selon la variante ou l'input explicite
          if [[ -n "${{ inputs.containerfile }}" ]]; then
            CONTAINERFILE="${{ inputs.containerfile }}"
          elif [[ "${{ inputs.image_name }}" == "gablue-main-test" ]]; then
            CONTAINERFILE="Containerfile-gablue-test"
          elif [[ "${{ inputs.image_name }}" == "gablue-nvidia-open-test" ]]; then
            CONTAINERFILE="Containerfile-gablue-nvidia-open-test"
          else
            CONTAINERFILE="Containerfile-gablue"
          fi

          # Définir DX_MODE pour la variante main-dx
          DX_MODE_ARG=""
          if [[ "${{ inputs.image_name }}" == "gablue-main-dx" ]]; then
            DX_MODE_ARG="--build-arg DX_MODE=true"
          fi

          # Préparer les arguments de build
          KERNEL_FLAVOR_ARG=""
          if [[ -n "${{ steps.get_kernel_version.outputs.KERNEL_FLAVOR }}" ]]; then
            KERNEL_FLAVOR_ARG="--build-arg KERNEL_FLAVOR=${{ steps.get_kernel_version.outputs.KERNEL_FLAVOR }}"
          fi

          sudo buildah build \
            --file "$CONTAINERFILE" \
            --format "docker" \
            --build-arg KERNEL_VERSION="${{ steps.determine_kernel_version.outputs.KERNEL_VERSION }}" \
            --build-arg NVIDIA_VERSION="${{ steps.get_kernel_version.outputs.NVIDIA_VERSION }}" \
            --build-arg VARIANT="${{ inputs.image_variant }}" \
            --build-arg SOURCE_IMAGE="${{ inputs.source_image }}" \
            --build-arg SOURCE_SUFFIX="${{ inputs.source_suffix }}" \
            --build-arg FEDORA_VERSION="${{ inputs.fedora_version }}" \
            --build-arg KERNEL_TYPE="${{ inputs.kernel_type }}" \
            $KERNEL_FLAVOR_ARG \
            $DX_MODE_ARG \
            --tag raw-img .

      # Hack pour corriger les permissions du cache (nécessaire pour actions/cache)
      - name: Hack around permission issue caching
        id: cache-perms
        run: |
          sudo chmod 777 --recursive /var/tmp/buildah-cache-0 2>/dev/null || true

      # Sauvegarde du cache DNF (uniquement si autorisé)
      - name: Save DNF package cache
        if: steps.cache-prep.outputs.allow_cache_write == 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: /var/tmp/buildah-cache-*
          key: ${{ runner.os }}-buildah-${{ steps.cache-prep.outputs.cache_name }}

      # Appliquer les labels OCI avant le rechunk
      - name: Apply Labels
        id: relabel
        env:
          IMAGE_LABELS: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository }}/main/README.md
            org.opencontainers.image.description=${{ inputs.image_desc }}
            org.opencontainers.image.title=${{ inputs.image_name }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.vendor=Universal Blue
        run: |
          version="${{ steps.timestamp.outputs.build_version }}"

          # Clean out labels from base image
          img=raw-img
          container=$(sudo buildah from $img)
          sudo buildah config --label "-" $container
          sudo buildah commit --identity-label=false --rm $container $img

          kver=$(sudo podman run --rm "$img" rpm -q --qf "%{VERSION}-%{RELEASE}.%{ARCH}\n" kernel-core)

          # Préparer les labels
          declare -a labels
          labels+=("org.opencontainers.image.version=$version")
          labels+=("org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')")
          labels+=("ostree.bootable=true")
          labels+=("ostree.linux=$kver")
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            labels+=("$line")
          done <<< "$IMAGE_LABELS"

          # Générer le manifest
          filter='{ "packages": [inputs | split(" ") | select(length==2) | { (.[0]): .[1] }] | sort_by(keys) | add }'
          manifest=$(sudo podman run --rm "$img" rpm -qa --qf '%{NAME} %{VERSION}\n' | jq -Rnc "$filter")
          labels+=("ostree.rechunk.info=$manifest")

          # Appliquer les labels et annotations (comme Bazzite)
          container=$(sudo buildah from $img)
          for line in "${labels[@]}"; do
            [ -z "$line" ] && continue
            sudo buildah config --label "$line" --annotation "$line" "$container"
          done

          sudo buildah commit --identity-label=false --rm $container $img
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Rechunk de l'image avec rpm-ostree (après application des labels)
      - name: Rechunk Image
        id: rechunk
        run: |
          container=$(sudo buildah from raw-img)
          mnt=$(sudo buildah mount $container)
          sudo bash -c "rm -rf $mnt/run/.* $mnt/run/* $mnt/tmp/.* $mnt/tmp/*"
          sudo buildah umount $container
          sudo buildah commit --identity-label=false --rm $container raw-img
          # Utiliser l'image elle-même pour le rechunk (comme Bazzite)
          sudo podman run --rm --privileged --volume /var/lib/containers:/var/lib/containers \
              localhost/raw-img \
              rpm-ostree compose build-chunked-oci \
              --bootc --max-layers 96 --format-version 2 \
              --from localhost/raw-img --output containers-storage:localhost/chunked-img
          sudo podman untag raw-img
          echo "ref=containers-storage:localhost/chunked-img" >> "$GITHUB_OUTPUT"

      # Génération des tags après relabel
      - name: Generate tags
        id: generate-tags
        shell: bash
        run: |
          VERSION_TAG="${{ steps.relabel.outputs.version }}"
          SHA_SHORT="${GITHUB_SHA::7}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              alias_tags=("pr-${{ github.event.number }}" "${SHA_SHORT}")
          else
              alias_tags=("${VERSION_TAG}" "latest")
          fi

          echo "Generated alias tags: ${alias_tags[*]}"
          echo "alias_tags=${alias_tags[*]}" >> $GITHUB_OUTPUT

      # Conversion registre en minuscules
      - name: Lowercase Registry
        id: registry_case
        uses: ASzc/change-string-case-action@v6
        with:
          string: ${{ env.IMAGE_REGISTRY }}

      # Installation Cosign
      - uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        with:
          cosign-release: "v2.6.1"
        if: github.event_name != 'pull_request'

      # Push et signature de l'image avec retry
      - name: Push To GHCR and Sign
        if: github.event_name != 'pull_request'
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          attempt_limit: 3
          attempt_delay: 15000
          command: |
            log_sum() { echo "$1" >> $GITHUB_STEP_SUMMARY; }
            log_sum '# Push to GHCR result'
            log_sum '```'
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Push unique image id and sign
            dest_image="${{ steps.registry_case.outputs.lowercase }}/${{ inputs.image_name }}:${{ steps.relabel.outputs.version }}"
            sudo skopeo copy ${{ steps.rechunk.outputs.ref }} docker://$dest_image
            log_sum "$dest_image"
            DIGEST=$(sudo skopeo inspect --format '{{.Digest}}' ${{ steps.rechunk.outputs.ref }})
            cosign sign -y --key env://COSIGN_PRIVATE_KEY --new-bundle-format=false \
              "${{ steps.registry_case.outputs.lowercase }}/${{ inputs.image_name }}@$DIGEST"

            # Push alias tags
            for tag in ${{ steps.generate-tags.outputs.alias_tags }}; do
              dest_image="${{ steps.registry_case.outputs.lowercase }}/${{ inputs.image_name }}:$tag"
              sudo skopeo copy ${{ steps.rechunk.outputs.ref }} docker://$dest_image
              log_sum "$dest_image"
            done
            log_sum '```'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}