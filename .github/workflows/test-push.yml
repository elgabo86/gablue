name: Test Push & Sign

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  # Test 1: skopeo copy dans nick-fields/retry (reproduit le hang)
  test-nick-fields-retry:
    name: nick-fields/retry (no timeout)
    runs-on: ubuntu-24.04
    steps:
      - name: Login
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull existing image
        run: sudo podman pull ghcr.io/${{ github.repository_owner }}/gablue-main:latest

      - name: Tag for test
        run: sudo podman tag gablue-main:latest localhost/chunked-img

      - name: skopeo copy via nick-fields/retry (reproduit le hang?)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 1
          command: |
            TAG="test-nf-$(date +%s)"
            dest_image="ghcr.io/${{ github.repository_owner }}/gablue-test-push:${TAG}"
            echo "=== skopeo copy (push) ==="
            sudo skopeo copy containers-storage:localhost/chunked-img docker://$dest_image
            echo "=== push done, inspecting remote ==="
            DIGEST=$(sudo skopeo inspect --format '{{.Digest}}' docker://$dest_image)
            echo "Digest: $DIGEST"

  # Test 2: meme chose mais avec timeout sur skopeo copy
  test-with-timeout:
    name: nick-fields/retry + timeout fix
    runs-on: ubuntu-24.04
    steps:
      - name: Login
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull existing image
        run: sudo podman pull ghcr.io/${{ github.repository_owner }}/gablue-main:latest

      - name: Tag for test
        run: sudo podman tag gablue-main:latest localhost/chunked-img

      - name: skopeo copy with timeout via nick-fields/retry
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 1
          command: |
            TAG="test-to-$(date +%s)"
            dest_image="ghcr.io/${{ github.repository_owner }}/gablue-test-push:${TAG}"
            echo "=== skopeo copy (push) with timeout 600 ==="
            set +e
            timeout 600 sudo skopeo copy containers-storage:localhost/chunked-img docker://$dest_image
            set -e
            echo "=== verifying push via remote inspect ==="
            DIGEST=$(timeout 60 sudo skopeo inspect --format '{{.Digest}}' docker://$dest_image)
            echo "Digest: $DIGEST"
