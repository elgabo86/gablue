name: Test Push & Sign

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  test-without-rechunk:
    name: Without rechunk
    runs-on: ubuntu-24.04
    steps:
      - name: Login
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull existing image
        run: sudo podman pull ghcr.io/${{ github.repository_owner }}/gablue-main:latest

      - name: Tag for test
        run: sudo podman tag gablue-main:latest localhost/chunked-img

      - name: Test skopeo copy + inspect remote
        id: test
        run: |
          TAG="test-$(date +%s)"
          dest_image="ghcr.io/${{ github.repository_owner }}/gablue-test-push:${TAG}"
          echo "=== skopeo copy (push) ==="
          sudo skopeo copy containers-storage:localhost/chunked-img docker://$dest_image
          echo "=== push done, inspecting remote ==="
          DIGEST=$(sudo skopeo inspect --format '{{.Digest}}' docker://$dest_image)
          echo "Digest: $DIGEST"
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v2.6.1"

      - name: Test cosign sign
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY --new-bundle-format=false \
            "ghcr.io/${{ github.repository_owner }}/gablue-test-push@${{ steps.test.outputs.digest }}"
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}

  test-with-rechunk:
    name: With rechunk
    runs-on: ubuntu-24.04
    steps:
      - name: Free space
        uses: ublue-os/remove-unwanted-software@v8

      - name: Mount BTRFS
        uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6
        with:
          target-dir: /var/lib/containers
          loopback-free: "1.0"

      - name: Login
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull existing image
        run: sudo podman pull ghcr.io/${{ github.repository_owner }}/gablue-main:latest

      - name: Tag for rechunk
        run: sudo podman tag gablue-main:latest localhost/raw-img

      - name: Rechunk
        id: rechunk
        run: |
          sudo podman run --rm --privileged --volume /var/lib/containers:/var/lib/containers \
              localhost/raw-img \
              rpm-ostree compose build-chunked-oci \
              --bootc --max-layers 127 --format-version 2 \
              --from localhost/raw-img --output containers-storage:localhost/chunked-img
          sudo podman untag raw-img
          echo "ref=containers-storage:localhost/chunked-img" >> "$GITHUB_OUTPUT"

      - name: Test skopeo copy + inspect remote
        id: test
        run: |
          TAG="test-$(date +%s)"
          dest_image="ghcr.io/${{ github.repository_owner }}/gablue-test-push:${TAG}"
          echo "=== skopeo copy (push) ==="
          sudo skopeo copy ${{ steps.rechunk.outputs.ref }} docker://$dest_image
          echo "=== push done, inspecting remote ==="
          DIGEST=$(sudo skopeo inspect --format '{{.Digest}}' docker://$dest_image)
          echo "Digest: $DIGEST"
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v2.6.1"

      - name: Test cosign sign
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY --new-bundle-format=false \
            "ghcr.io/${{ github.repository_owner }}/gablue-test-push@${{ steps.test.outputs.digest }}"
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
