name: build-gablue-isos

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 */5 * *"
  workflow_dispatch:

jobs:
  build-and-upload-isos:
    name: build-gablue-isos
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        iso:
          - name: "gablue-main"
            repo: "ghcr.io/elgabo86"
            tag: "latest"
            version: "44"
            variant: "Kinoite"
          - name: "gablue-main-dx"
            repo: "ghcr.io/elgabo86"
            tag: "latest"
            version: "44"
            variant: "Kinoite"
          - name: "gablue-nvidia"
            repo: "ghcr.io/elgabo86"
            tag: "latest"
            version: "44"
            variant: "Kinoite"
          - name: "gablue-nvidia-open"
            repo: "ghcr.io/elgabo86"
            tag: "latest"
            version: "44"
            variant: "Kinoite"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build ISO
        uses: jasonn3/build-container-installer@main
        id: build
        with:
          arch: "x86_64"
          image_name: ${{ matrix.iso.name }}
          image_repo: ${{ matrix.iso.repo }}
          image_tag: ${{ matrix.iso.tag }}
          version: ${{ matrix.iso.version }}
          variant: ${{ matrix.iso.variant }}
          iso_name: ${{ matrix.iso.name }}-${{ matrix.iso.tag }}-${{ matrix.iso.version }}.iso
          secure_boot_key_url: '${{ github.server_url }}/${{ github.repository }}/raw/main/secure_boot.der'
          enrollment_password: 'secureblue'
          additional_templates: "/github/workspace/files/lorax/disable-user-spoke.tmpl"

      - name: Generate Checksum
        run: |
          ISO_PATH="${{ matrix.iso.name }}-${{ matrix.iso.tag }}-${{ matrix.iso.version }}.iso"
          CHECKSUM_FILE="${{ matrix.iso.name }}-${{ matrix.iso.tag }}-${{ matrix.iso.version }}.iso.sha256"
          sha256sum "$ISO_PATH" > "$CHECKSUM_FILE"
          echo "Checksum generated: $CHECKSUM_FILE"

      - name: Upload ISO to BuzzHeavier
        id: upload
        run: |
          ISO_PATH="${{ matrix.iso.name }}-${{ matrix.iso.tag }}-${{ matrix.iso.version }}.iso"
          ISO_NAME="${{ matrix.iso.name }}"
          echo "Uploading $ISO_NAME from $ISO_PATH..."
          RESPONSE=$(curl -s -T "$ISO_PATH" "https://w.buzzheavier.com/$ISO_PATH")
          ID=$(echo "$RESPONSE" | jq -r '.data.id')
          LINK="https://buzzheavier.com/$ID"
          if [ -n "$ID" ] && [ "$ID" != "null" ]; then
            echo "Download link for $ISO_NAME: $LINK"
            echo "$LINK" > "${ISO_NAME}-link.txt"
          else
            echo "Échec de l'upload : $RESPONSE"
            exit 1
          fi

      - name: Upload Link Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.iso.name }}-link
          path: ${{ matrix.iso.name }}-link.txt

      - name: Upload Checksum Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.iso.name }}-checksum
          path: ${{ matrix.iso.name }}-${{ matrix.iso.tag }}-${{ matrix.iso.version }}.iso.sha256

  create-release:
    needs: build-and-upload-isos
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Download Link Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "*-link"
          path: links

      - name: Download Checksum Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "*-checksum"
          path: checksums

      - name: Build release body
        run: |
          {
            echo "Download ISOs:"
            for link_file in links/*/*.txt; do
              ISO_NAME=$(basename "$(dirname "$link_file")" | sed 's/-link$//')
              LINK=$(cat "$link_file")
              echo "- **${ISO_NAME}**: ${LINK}"
            done
          } > body.md

      - name: Delete previous release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest-iso" | jq -r '.id')
          if [ "$RELEASE_ID" != "null" ]; then
            curl -s -X DELETE -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
            echo "Previous release deleted"
          else
            echo "No previous release found"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: "latest-iso"
          name: "Latest ISO Release"
          body_path: body.md
          files: checksums/*/*.sha256
          draft: false
          prerelease: false
